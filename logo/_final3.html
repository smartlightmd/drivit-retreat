<!doctype html><html><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600&family=Quicksand:wght@600&display=swap" rel="stylesheet">
<style>
body{margin:0;background:#EFEAE2;font-family:Quicksand,sans-serif;padding:34px;color:#3A2A20}
h1{margin:0 0 22px;font-weight:700}
.row{display:flex;gap:24px;flex-wrap:wrap;align-items:center;margin-bottom:22px}
.card{border-radius:18px;padding:34px 40px;display:flex;flex-direction:column;align-items:center;gap:16px}
.light{background:#FAF7F2;border:1px solid #e3d8c8}.dark{background:#241A15}
.wm{font-family:Fraunces,serif;font-weight:600;font-size:44px;letter-spacing:.5px}
.chip{background:#fff;border:1px solid #e3d8c8;border-radius:12px;padding:10px;display:flex;flex-direction:column;align-items:center;gap:6px}
.chip.d{background:#241A15;color:#cbb}
.lab{font-size:.72rem;color:#9a8a7a}
.avatar{width:72px;height:72px;border-radius:50%;overflow:hidden;background:#C4694A;display:grid;place-items:center}
</style></head><body>
<h1>Drivit — финал (вариант 3 · Восход)</h1>
<div class="row">
  <div class="card light"><img src="drivit-3-sunrise-icon.svg" width="96" height="96"><span class="wm">Drivit</span></div>
  <div class="card dark"><img src="drivit-3-sunrise-icon.svg" width="96" height="96"><span class="wm" style="color:#F3E7D8">Drivit</span></div>
</div>
<div class="row">
  <div class="chip"><img src="drivit-3-sunrise-icon.svg" width="64" height="64"><span class="lab">64</span></div>
  <div class="chip"><img src="drivit-3-sunrise-icon.svg" width="32" height="32"><span class="lab">32 (favicon)</span></div>
  <div class="chip"><img src="drivit-3-sunrise-icon.svg" width="16" height="16"><span class="lab">16</span></div>
  <div class="chip d"><img src="drivit-3-sunrise-icon.svg" width="32" height="32"><span class="lab">32 dark</span></div>
  <div class="chip"><span class="avatar"><img src="drivit-3-sunrise-icon.svg" width="64" height="64"></span><span class="lab">avatar</span></div>
</div>
</body></html>
