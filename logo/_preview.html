<!doctype html><html><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;600;700&family=Fraunces:opsz,wght@9..144,500;9..144,600&display=swap" rel="stylesheet">
<style>
body{margin:0;background:#EFEAE2;font-family:Quicksand,sans-serif;padding:30px;color:#3A2A20}
h1{font-weight:700;margin:0 0 4px}.s{color:#8a7a6a;margin:0 0 26px}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:22px}
.col{display:flex;flex-direction:column;gap:14px}
.name{font-weight:700;font-size:1.05rem}.name b{color:#C4694A}
.card{border-radius:16px;padding:26px;display:flex;flex-direction:column;align-items:center;gap:14px}
.light{background:#FAF7F2;border:1px solid #e3d8c8}
.dark{background:#241A15}
.wm{font-family:Quicksand,sans-serif;font-weight:600;font-size:34px;letter-spacing:2px}
.wm.serif{font-family:Fraunces,serif;font-weight:600;letter-spacing:0}
.row{display:flex;align-items:center;gap:18px}
.chip{background:#fff;border:1px solid #e3d8c8;border-radius:10px;padding:8px}
.lab{font-size:.75rem;color:#8a7a6a}
</style></head><body>
<h1>Drivit — 3 концепции лого</h1><p class="s">эмблема + текст · тёплая палитра · свет/тьма · компакт до 32px</p>

<svg width="0" height="0" style="position:absolute"><defs>

<symbol id="lotus" viewBox="0 0 100 100">
  <circle cx="50" cy="50" r="45" fill="none" stroke="#C9A15C" stroke-width="2.5"/>
  <g>
    <path d="M50 71 C40 57 40 34 50 24 C60 34 60 57 50 71Z" fill="#E8DCC8" transform="rotate(-63 50 71)"/>
    <path d="M50 71 C40 57 40 34 50 24 C60 34 60 57 50 71Z" fill="#E8DCC8" transform="rotate(63 50 71)"/>
    <path d="M50 71 C40 57 40 34 50 24 C60 34 60 57 50 71Z" fill="#C4694A" transform="rotate(-33 50 71)"/>
    <path d="M50 71 C40 57 40 34 50 24 C60 34 60 57 50 71Z" fill="#C4694A" transform="rotate(33 50 71)"/>
    <path d="M50 71 C41 55 41 31 50 21 C59 31 59 55 50 71Z" fill="#B85A3E"/>
    <circle cx="50" cy="67" r="4.5" fill="#C9A15C"/>
  </g>
</symbol>

<symbol id="medit" viewBox="0 0 100 100">
  <circle cx="50" cy="50" r="45" fill="none" stroke="#C9A15C" stroke-width="2.5"/>
  <circle cx="50" cy="48" r="33" fill="#E8DCC8"/>
  <circle cx="50" cy="35" r="8" fill="#C4694A"/>
  <path d="M50 45 C41 45 38 51 37 58 C36 64 30 67 27 72 C40 75 60 75 73 72 C70 67 64 64 63 58 C62 51 59 45 50 45Z" fill="#C4694A"/>
  <circle cx="50" cy="57" r="3" fill="#C9A15C"/>
</symbol>

<symbol id="sun" viewBox="0 0 100 100">
  <clipPath id="cc"><circle cx="50" cy="50" r="43"/></clipPath>
  <g clip-path="url(#cc)">
    <rect x="0" y="0" width="100" height="100" fill="#FAF3EA"/>
    <circle cx="50" cy="42" r="14" fill="#C9A15C"/>
    <path d="M-4 72 C16 52 30 57 50 63 C69 57 84 52 104 72 L104 104 L-4 104Z" fill="#C4694A"/>
    <path d="M2 80 C22 74 32 84 50 80 C68 76 80 84 98 80" fill="none" stroke="#E8DCC8" stroke-width="3.4" stroke-linecap="round"/>
    <path d="M2 90 C22 84 34 93 50 89 C67 85 80 92 98 89" fill="none" stroke="#E8DCC8" stroke-width="3.4" stroke-linecap="round"/>
  </g>
  <circle cx="50" cy="50" r="45" fill="none" stroke="#C9A15C" stroke-width="2.5"/>
</symbol>

</defs></svg>

<div class="grid">
<div class="col"><div class="name">1 · <b>Лотос</b> в круге</div>
  <div class="card light"><svg width="92" height="92"><use href="#lotus"/></svg><span class="wm">Drivit</span></div>
  <div class="card dark"><svg width="92" height="92"><use href="#lotus"/></svg><span class="wm" style="color:#F3E7D8">Drivit</span></div>
  <div class="row"><span class="lab">64 / 32:</span><span class="chip"><svg width="64" height="64"><use href="#lotus"/></svg></span><span class="chip"><svg width="32" height="32"><use href="#lotus"/></svg></span></div>
</div>

<div class="col"><div class="name">2 · <b>Медитация</b> в солнце</div>
  <div class="card light"><svg width="92" height="92"><use href="#medit"/></svg><span class="wm">Drivit</span></div>
  <div class="card dark"><svg width="92" height="92"><use href="#medit"/></svg><span class="wm" style="color:#F3E7D8">Drivit</span></div>
  <div class="row"><span class="lab">64 / 32:</span><span class="chip"><svg width="64" height="64"><use href="#medit"/></svg></span><span class="chip"><svg width="32" height="32"><use href="#medit"/></svg></span></div>
</div>

<div class="col"><div class="name">3 · <b>Восход</b> над водой</div>
  <div class="card light"><svg width="92" height="92"><use href="#sun"/></svg><span class="wm serif">Drivit</span></div>
  <div class="card dark"><svg width="92" height="92"><use href="#sun"/></svg><span class="wm serif" style="color:#F3E7D8">Drivit</span></div>
  <div class="row"><span class="lab">64 / 32:</span><span class="chip"><svg width="64" height="64"><use href="#sun"/></svg></span><span class="chip"><svg width="32" height="32"><use href="#sun"/></svg></span></div>
</div>
</div>
</body></html>
